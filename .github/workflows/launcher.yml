name: CloudSurf Runner

on:
  schedule:
    - cron: '*/1 * * * *'
    # - cron: '*/10 2-8 * * *'    # Every 10min, 2am–8am UTC (best Colab window)
    # - cron: '*/10 14-16 * * *'  # Every 10min, 2pm–4pm UTC (midday window)
  workflow_dispatch:              # Manual trigger anytime

jobs:
  launch:
    runs-on: ubuntu-latest
    steps:
        - name: Start CloudSurf Codespace
          run: |
            CODESPACE="${{ vars.CLOUDSURF_CODESPACE_NAME }}"
            
            if [ -z "$CODESPACE" ]; then
              echo "❌ No codespace name set! Add CLOUDSURF_CODESPACE_NAME to repo variables."
              exit 1
            fi
  
            echo "🔍 Checking codespace: $CODESPACE"
            
            STATE=$(gh codespace list --repo ${{ github.repository }} --json name,state -q --arg cs "$CODESPACE" '.[] | select(.name==$cs) | .state')
            echo "Current state: ${STATE:-Not found}"
            
            if [ "$STATE" = "Available" ]; then
              echo "✅ Codespace is already running."
            else
              echo "🚀 Starting codespace..."
              # This command will start the codespace if stopped
              gh codespace code --codespace "$CODESPACE" --no-open
              echo "✅ Started successfully!"
            fi
          env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
