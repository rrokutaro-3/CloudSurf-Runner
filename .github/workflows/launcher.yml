name: CloudSurf Runner

on:
  schedule:
    - cron: '*/5 * * * *'     # Every 5 minutes (better than every 1)
  workflow_dispatch:

jobs:
  launch:
    runs-on: ubuntu-latest

    steps:
        - name: Start CloudSurf Codespace
          run: |
            CODESPACE="shiny-space-broccoli-xq9wjp4wp67h46q"
            
            echo "🔍 Current status of $CODESPACE"
            STATE=$(gh codespace list --json name,state -q '.[] | select(.name == "'$CODESPACE'") | .state' || echo "unknown")
            echo "State: $STATE"
            
            if [ "$STATE" = "Available" ]; then
              echo "✅ Already running"
            else
              echo "🚀 Attempting to wake up codespace..."
              
              # This often forces it to start
              gh codespace view --codespace "$CODESPACE" > /dev/null 2>&1 || true
              
              echo "⏳ Waiting and checking..."
              for i in {1..18}; do
                sleep 10
                NEW_STATE=$(gh codespace list --json name,state -q '.[] | select(.name == "'$CODESPACE'") | .state' || echo "unknown")
                echo "Check $i: $NEW_STATE"
                if [ "$NEW_STATE" = "Available" ]; then
                  echo "🎉 Successfully started!"
                  exit 0
                fi
              done
              
              echo "⚠️ Still not available after 3 minutes. It may need more time or manual start."
            fi
          env:
            GH_TOKEN: ${{ secrets.CLOUDSURF_PAT }}
