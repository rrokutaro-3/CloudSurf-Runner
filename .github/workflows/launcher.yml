name: CloudSurf Runner

on:
  schedule:
    - cron: '*/1 * * * *'
    # - cron: '*/10 2-8 * * *'    # Every 10min, 2am–8am UTC (best Colab window)
    # - cron: '*/10 14-16 * * *'  # Every 10min, 2pm–4pm UTC (midday window)
  workflow_dispatch:              # Manual trigger anytime

jobs:
  launch:
    runs-on: ubuntu-latest
    steps:
        - name: Start CloudSurf Codespace
          run: |
            CODESPACE="${{ vars.CLOUDSURF_CODESPACE_NAME }}"
            
            if [ -z "$CODESPACE" ]; then
              echo "❌ No codespace name set!"
              exit 1
            fi
  
            echo "🔍 Checking codespace: $CODESPACE"
            
            # Get state
            STATE=$(gh codespace list --repo ${{ github.repository }} \
              --json name,state \
              -q '.[] | select(.name == "'$CODESPACE'") | .state')
            
            echo "Current state: ${STATE:-Not found}"
            
            if [ "$STATE" = "Available" ]; then
              echo "✅ Codespace is already running."
            else
              echo "🚀 Starting codespace (this may take 30-60 seconds)..."
              gh codespace code --codespace "$CODESPACE" --web > /dev/null 2>&1 || true
              echo "✅ Started successfully (or already starting)!"
            fi
          env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
