name: CloudSurf Runner
on:
  workflow_dispatch:
jobs:
  launch:
    runs-on: ubuntu-latest
    steps:
      - name: Wake CloudSurf Codespace (all tricks)
        run: |
          CODESPACE="${{ secrets.CLOUDSURF_CODESPACE_NAME }}"
          check_state() {
            gh codespace list --json name,state \
              -q '.[] | select(.name == "'"$CODESPACE"'") | .state' 2>/dev/null || echo "unknown"
          }
          STATE=$(check_state)
          echo "📋 Current state: $STATE"
          if [ "$STATE" = "Available" ]; then
            echo "✅ Already running — nothing to do."
            exit 0
          fi
          # ── Trick 1: official start command ──────────────────────────────
          echo "🚀 Trick 1: gh codespace start"
          gh codespace start --codespace "$CODESPACE" 2>&1 || true
          STATE=$(check_state)
          echo "   State after start: $STATE"
          [ "$STATE" = "Available" ] && echo "🎉 Done (trick 1)!" && exit 0
          # ── Trick 2: SSH ping — forces the runtime to wake ───────────────
          echo "🔌 Trick 2: SSH ping"
          gh codespace ssh --codespace "$CODESPACE" -- echo "ping" 2>&1 || true
          STATE=$(check_state)
          echo "   State after SSH ping: $STATE"
          [ "$STATE" = "Available" ] && echo "🎉 Done (trick 2)!" && exit 0
          # ── Trick 3: REST API start nudge ─────────────────────────────────
          echo "🌐 Trick 3: REST API POST /start"
          curl -s -o /dev/null -w "HTTP %{http_code}" \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/user/codespaces/$CODESPACE/start" 2>&1 || true
          echo ""
          STATE=$(check_state)
          echo "   State after REST nudge: $STATE"
          [ "$STATE" = "Available" ] && echo "🎉 Done (trick 3)!" && exit 0
          # ── All tricks exhausted — codespace is dead, bail out ────────────
          echo "❌ Codespace unavailable after all tricks. Out of hours?"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.CLOUDSURF_PAT }}
